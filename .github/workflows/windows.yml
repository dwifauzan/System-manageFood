name: Build Windows
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Deploy Qt Dependencies
        run: |
          $qt_bin = "$env:Qt6_DIR\bin"
          & "$qt_bin\windeployqt.exe" --release --no-translations --no-opengl-sw build/Release/InventarisMBG.exe

      - name: Create Zip
        run: |
          Compress-Archive -Path build/Release/* -DestinationPath InventarisMBG-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventarisMBG-Windows
          path: InventarisMBG-Windows.zip
